# ============================================= #
# Handle Colors & Terminals
# ============================================= #
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

# ============================================= #
# General Settings
# ============================================= #
set -g history-limit 10000
set -g mouse on               # Enable mouse support
set -s escape-time 0           # Address vim mode switching delay
set -g display-time 4000       # Tmux messages are displayed for 4 seconds
set -g focus-events on         # Assist vim 'autoread'
set -g base-index 1            # Start windows at 1 instead of 0
setw -g pane-base-index 1      # Start panes at 1 instead of 0
set -g renumber-windows on     # Automatically renumber windows when one is closed

# ============================================= #
# Key Bindings (Vim-style)
# ============================================= #

# Change Prefix from Ctrl-b to Ctrl-a (easier to reach)
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# Easy config reload
bind r source-file ~/.tmux.conf \; display "Config Reloaded!"

# Split panes using | and - (and stay in current directory)
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# Vim-style pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Vim-style pane resizing
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Vim-style Copy Mode
setw -g mode-keys vi
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel

# ============================================= #
# Visual Styles (Dark Theme)
# ============================================= #

# Status bar colors
set -g status-style bg='#1e1e2e',fg='#cdd6f4'
set -g status-interval 1

# Status Left (Session name)
set -g status-left-length 30
set -g status-left "#[fg=#1e1e2e,bg=#89b4fa,bold] 󰭦 #S #[default] "

# Window Status (Tabs)
setw -g window-status-format "#[fg=#6c7086] #I:#W "
setw -g window-status-current-format "#[fg=#1e1e2e,bg=#fab387,bold] #I:#W #[default]"
setw -g window-status-separator ""

# Status Right (Clock & Battery-ish)
set -g status-right-length 100
set -g status-right "#[fg=#6c7086] %Y-%m-%d #[fg=#1e1e2e,bg=#a6e3a1,bold] %H:%M "

# Pane Borders
set -g pane-border-style fg='#313244'
set -g pane-active-border-style fg='#89b4fa'

# Message text
set -g message-style bg='#1e1e2e',fg='#f5e0dc',bold
